name: Generate and commit badges

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Build with Maven
        run: mvn -B verify
        working-directory: word-map

      - name: Generate Coverage Badges for Word Map
        id: jacocoWordMap
        uses: cicirello/jacoco-badge-generator@v2
        with:
          jacoco-csv-file: word-map/target/site/jacoco/jacoco.csv
          coverage-badge-filename: .github/badges/jacoco_word_map.svg
          coverage-label: coverage (Word Map)

      - name: Commit and push the badge(if changed)
        run: |
          git config --global user.name github-actions
          git config --global user.email github-actions@github.com
          mkdir -p .github/badges
          git add .github/badges/*.svg
          git commit -m "JaCoCo coverage badges" || echo "No changes to commit"
          git push --force origin HEAD:badges-branch
