databaseChangeLog:
  - changeSet:
      id: create-servers-table
      author: Vlad
      changes:
        - createTable:
            tableName: servers
            columns:
              - column:
                  name: id
                  type: BIGINT
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: platform_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: language_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: name
                  type: VARCHAR(100)
              - column:
                  name: wipe_count
                  type: SMALLINT
                  defaultValueNumeric: 0
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false
              - column:
                  name: wiped_at
                  type: TIMESTAMP
              - column:
                  name: closed_at
                  type: TIMESTAMP
              - column:
                  name: is_open
                  type: BOOLEAN
                  defaultValueBoolean: true
                  constraints:
                    nullable: false

        - addForeignKeyConstraint:
            baseTableName: servers
            baseColumnNames: platform_id
            referencedTableName: platforms
            referencedColumnNames: id
            onDelete: CASCADE
            constraintName: fk_servers_platforms

        - addForeignKeyConstraint:
            baseTableName: servers
            baseColumnNames: language_id
            referencedTableName: languages
            referencedColumnNames: id
            onDelete: CASCADE
            constraintName: fk_servers_languages