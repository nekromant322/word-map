databaseChangeLog:
  - changeSet:
      id: rename-user-id-to-player-id
      author: Inger2
      changes:

        - renameColumn:
            tableName: offers
            oldColumnName: user_id
            newColumnName: player_id
            columnDataType: bigint

        - addForeignKeyConstraint:
            baseTableName: offers
            baseColumnNames: player_id
            referencedTableName: players
            referencedColumnNames: id
            constraintName: fk_offers_players
            onDelete: CASCADE